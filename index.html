<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebulalicious's Dream</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { text-align: center; padding: 48px 20px 24px; background: linear-gradient(180deg, #1a1a2e 0%, transparent 100%); }
    header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; background: linear-gradient(135deg, #e94560, #a855f7, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
    header p { color: var(--muted); margin-top: 8px; font-size: 1rem; }
    .controls { max-width: 1200px; margin: 24px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .search-wrap input { width: 100%; padding: 12px 16px 12px 44px; background: var(--surface); border: 1px solid #2a2a4a; border-radius: 50px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid #2a2a4a; background: var(--surface); color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .stats { max-width: 1200px; margin: 0 auto 16px; padding: 0 20px; color: var(--muted); font-size: 0.85rem; }
    .grid { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 1px solid #1e1e3a; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(233, 69, 96, 0.2); border-color: var(--accent); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #111; }
    .card-info { padding: 12px 14px; }
    .card-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .tag { font-size: 0.72rem; padding: 3px 10px; border-radius: 50px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .tag-scenery { background: #0f3460; color: #38bdf8; }
    .tag-pose { background: #2d1b4e; color: #a855f7; }
    .tag-composite { background: #3d1a1a; color: #f97316; }
    .card-date { font-size: 0.75rem; color: var(--muted); }
    .empty { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty svg { margin-bottom: 16px; opacity: 0.3; }
    .empty p { font-size: 1.1rem; }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
    .lightbox.open { display: flex; }
    .lb-inner { background: var(--surface); border-radius: 16px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; border: 1px solid #2a2a4a; animation: popIn 0.2s ease; }
    @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .lb-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #2a2a4a; }
    .lb-title { font-size: 1.1rem; font-weight: 700; }
    .lb-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.5rem; line-height: 1; padding: 4px 8px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
    .lb-close:hover { color: var(--text); background: #ffffff10; }
    .lb-image { width: 100%; max-height: 500px; object-fit: contain; background: #0d0d0d; }
    .lb-body { padding: 20px; }
    .lb-prompt-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
    .lb-prompt { background: #0d0d0d; border: 1px solid #2a2a4a; border-radius: 8px; padding: 14px; font-size: 0.9rem; line-height: 1.6; color: #ccc; white-space: pre-wrap; }
    .lb-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .btn-copy { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background 0.2s, transform 0.1s; }
    .btn-copy:hover { background: #c73652; }
    .btn-copy:active { transform: scale(0.97); }
    .btn-copy.copied { background: #22c55e; }
    .lb-meta { color: var(--muted); font-size: 0.82rem; margin-top: 10px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    @media (max-width: 600px) { .lb-inner { border-radius: 12px; } .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; } }
  </style>
</head>
<body>
  <header>
    <h1>Nebulalicious's Dream</h1>
    <p>AI-generated worlds, one image at a time</p>
  </header>
  <div class="controls">
    <div class="search-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search by title or prompt..." />
    </div>
    <div class="filters">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="scenery">Scenery</button>
      <button class="filter-btn" data-cat="pose">Pose</button>
      <button class="filter-btn" data-cat="composite">Composite</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
  <div class="lightbox" id="lightbox">
    <div class="lb-inner">
      <div class="lb-header">
        <span class="lb-title" id="lbTitle"></span>
        <button class="lb-close" id="lbClose">&#x2715;</button>
      </div>
      <img class="lb-image" id="lbImage" src="" alt="" />
      <div class="lb-body">
        <div class="lb-prompt-label">Prompt</div>
        <div class="lb-prompt" id="lbPrompt"></div>
        <div class="lb-actions">
          <button class="btn-copy" id="copyBtn">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Prompt
          </button>
        </div>
        <div class="lb-meta" id="lbMeta"></div>
      </div>
    </div>
  </div>
  <script>
    let allImages = [];
    let activeCategory = 'all';
    let searchQuery = '';
    fetch('data.json').then(r => r.json()).then(data => { allImages = data; render(); }).catch(() => { allImages = []; render(); });
    function render() {
      const grid = document.getElementById('grid');
      const stats = document.getElementById('stats');
      const filtered = allImages.filter(img => {
        const catMatch = activeCategory === 'all' || img.category?.toLowerCase() === activeCategory;
        const q = searchQuery.toLowerCase();
        const textMatch = !q || img.title?.toLowerCase().includes(q) || img.prompt?.toLowerCase().includes(q);
        return catMatch && textMatch;
      });
      stats.textContent = `Showing ${filtered.length} of ${allImages.length} images`;
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty"><svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>No images found. Try a different search or filter.</p></div>`;
        return;
      }
      grid.innerHTML = filtered.map((img) => `<div class="card" onclick="openLightbox(${allImages.indexOf(img)})"><img src="${img.image_url}" alt="${escHtml(img.title)}" loading="lazy" /><div class="card-info"><div class="card-title">${escHtml(img.title)}</div><div class="card-meta"><span class="tag tag-${img.category?.toLowerCase() || 'scenery'}">${img.category || 'Scenery'}</span><span class="card-date">${formatDate(img.date)}</span></div></div></div>`).join('');
    }
    function openLightbox(index) {
      const img = allImages[index];
      document.getElementById('lbTitle').textContent = img.title;
      document.getElementById('lbImage').src = img.image_url;
      document.getElementById('lbImage').alt = img.title;
      document.getElementById('lbPrompt').textContent = img.prompt;
      document.getElementById('lbMeta').textContent = `${img.category || 'Scenery'} · ${formatDate(img.date)}`;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
      const copyBtn = document.getElementById('copyBtn');
      copyBtn.className = 'btn-copy';
      copyBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Prompt`;
    }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    document.getElementById('copyBtn').addEventListener('click', () => {
      const prompt = document.getElementById('lbPrompt').textContent;
      navigator.clipboard.writeText(prompt).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Prompt`; }, 2000);
      });
    });
    document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); activeCategory = btn.dataset.cat; render(); }); });
    document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; render(); });
    function escHtml(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function formatDate(dateStr) { if (!dateStr) return ''; const d = new Date(dateStr); if (isNaN(d)) return dateStr; return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  </script>
</body>
</html>
