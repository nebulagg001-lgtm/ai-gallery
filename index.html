<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebulalicious's Dream</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { text-align: center; padding: 48px 20px 24px; background: linear-gradient(180deg, #1a1a2e 0%, transparent 100%); }
    header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; background: linear-gradient(135deg, #e94560, #a855f7, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
    header p { color: var(--muted); margin-top: 8px; font-size: 1rem; }
    .controls { max-width: 1200px; margin: 24px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .search-wrap input { width: 100%; padding: 12px 16px 12px 44px; background: var(--surface); border: 1px solid #2a2a4a; border-radius: 50px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid #2a2a4a; background: var(--surface); color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .stats { max-width: 1200px; margin: 0 auto 16px; padding: 0 20px; color: var(--muted); font-size: 0.85rem; }
    .grid { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 1px solid #1e1e3a; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(233, 69, 96, 0.2); border-color: var(--accent); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #111; }
    .card-info { padding: 12px 14px; }
    .card-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.8rem; color: var(--muted); }
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 100; display: none; flex-direction: column; }
    .lightbox.active { display: flex; }
    .lightbox-header { padding: 16px 20px; background: rgba(26,26,46,0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a4a; }
    .lightbox-close { background: none; border: none; color: var(--text); cursor: pointer; font-size: 2rem; line-height: 1; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
    .lightbox-close:hover { color: var(--accent); }
    .lightbox-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; }
    .lightbox-img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; }
    .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(26,26,46,0.8); border: 1px solid #2a2a4a; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 1.5rem; transition: all 0.2s; backdrop-filter: blur(10px); }
    .lightbox-nav:hover { background: var(--accent); border-color: var(--accent); }
    .lightbox-nav.prev { left: 20px; }
    .lightbox-nav.next { right: 20px; }
    .lightbox-info { padding: 20px; background: rgba(26,26,46,0.8); backdrop-filter: blur(10px); border-top: 1px solid #2a2a4a; }
    .lightbox-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
    .lightbox-prompt { color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
    .lightbox-meta { display: flex; gap: 24px; margin-top: 12px; font-size: 0.85rem; }
    .lightbox-meta span { color: var(--muted); }
    .lightbox-meta strong { color: var(--text); }
  </style>
</head>
<body>
  <header>
    <h1>Nebulalicious's Dream</h1>
    <p>AI-Generated Art Gallery</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="7"/><path d="M13 13l6 6"/></svg>
      <input type="text" id="search" placeholder="Search by title or prompt..." />
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="scenery">Scenery</button>
      <button class="filter-btn" data-filter="pose">Pose</button>
      <button class="filter-btn" data-filter="composite">Composite</button>
    </div>
  </div>

  <div class="stats" id="stats">Loading...</div>
  <div class="grid" id="gallery"></div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-header">
      <div></div>
      <button class="lightbox-close" id="closeLightbox">&times;</button>
    </div>
    <div class="lightbox-body">
      <img class="lightbox-img" id="lightboxImg" src="" alt="" />
      <div class="lightbox-nav prev" id="prevImg">&#8249;</div>
      <div class="lightbox-nav next" id="nextImg">&#8250;</div>
    </div>
    <div class="lightbox-info">
      <div class="lightbox-title" id="lightboxTitle"></div>
      <div class="lightbox-prompt" id="lightboxPrompt"></div>
      <div class="lightbox-meta">
        <span>Type: <strong id="lightboxType"></strong></span>
        <span>Created: <strong id="lightboxDate"></strong></span>
      </div>
    </div>
  </div>

  <script>
    let allImages = [];
    let filteredImages = [];
    let currentFilter = 'all';
    let searchQuery = '';
    let currentLightboxIndex = 0;

    // Helper function to get image URL from different field formats
    function getImageUrl(img) {
      if (img.image_url) return img.image_url;
      if (img.image) return 'https://raw.githubusercontent.com/nebulagg001-lgtm/ai-gallery/main/' + img.image;
      if (img.filename) return 'https://raw.githubusercontent.com/nebulagg001-lgtm/ai-gallery/main/images/' + img.filename;
      return '';
    }

    // Fetch data
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        allImages = data;
        filteredImages = data;
        renderGallery();
        updateStats();
      })
      .catch(err => {
        console.error('Error loading gallery:', err);
        document.getElementById('stats').textContent = 'Failed to load gallery data.';
      });

    // Search
    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase();
      applyFilters();
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        applyFilters();
      });
    });

    function applyFilters() {
      filteredImages = allImages.filter(img => {
        const matchesType = currentFilter === 'all' || img.type === currentFilter;
        const matchesSearch = !searchQuery || 
          img.title.toLowerCase().includes(searchQuery) ||
          (img.prompt && img.prompt.toLowerCase().includes(searchQuery));
        return matchesType && matchesSearch;
      });
      renderGallery();
      updateStats();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = filteredImages.map((img, idx) => `
        <div class="card" onclick="openLightbox(${idx})">
          <img src="${getImageUrl(img)}" alt="${img.title}" loading="lazy" />
          <div class="card-info">
            <div class="card-title">${img.title}</div>
            <div class="card-meta">
              <span>${img.type}</span>
              <span>${new Date(img.timestamp).toLocaleDateString()}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function updateStats() {
      const total = filteredImages.length;
      const types = filteredImages.reduce((acc, img) => {
        acc[img.type] = (acc[img.type] || 0) + 1;
        return acc;
      }, {});
      const typeText = Object.entries(types).map(([k,v]) => `${k}: ${v}`).join(' | ');
      document.getElementById('stats').textContent = `Showing ${total} image${total !== 1 ? 's' : ''} ${typeText ? '(' + typeText + ')' : ''}`;
    }

    function openLightbox(index) {
      currentLightboxIndex = index;
      showLightboxImage();
      document.getElementById('lightbox').classList.add('active');
    }

    function showLightboxImage() {
      const img = filteredImages[currentLightboxIndex];
      document.getElementById('lightboxImg').src = getImageUrl(img);
      document.getElementById('lightboxTitle').textContent = img.title;
      document.getElementById('lightboxPrompt').textContent = img.prompt || 'No prompt available';
      document.getElementById('lightboxType').textContent = img.type;
      document.getElementById('lightboxDate').textContent = new Date(img.timestamp).toLocaleString();
    }

    document.getElementById('closeLightbox').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('active');
    });

    document.getElementById('prevImg').addEventListener('click', () => {
      currentLightboxIndex = (currentLightboxIndex - 1 + filteredImages.length) % filteredImages.length;
      showLightboxImage();
    });

    document.getElementById('nextImg').addEventListener('click', () => {
      currentLightboxIndex = (currentLightboxIndex + 1) % filteredImages.length;
      showLightboxImage();
    });

    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target.id === 'lightbox') {
        document.getElementById('lightbox').classList.remove('active');
      }
    });

    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').classList.contains('active')) {
        if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
        if (e.key === 'ArrowLeft') document.getElementById('prevImg').click();
        if (e.key === 'ArrowRight') document.getElementById('nextImg').click();
      }
    });
  </script>
</body>
</html>
