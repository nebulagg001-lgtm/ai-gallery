<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebulalicious's Dream</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { text-align: center; padding: 48px 20px 24px; background: linear-gradient(180deg, #1a1a2e 0%, transparent 100%); }
    header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; background: linear-gradient(135deg, #e94560, #a855f7, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
    header p { color: var(--muted); margin-top: 8px; font-size: 1rem; }
    .controls { max-width: 1200px; margin: 24px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .search-wrap input { width: 100%; padding: 12px 16px 12px 44px; background: var(--surface); border: 1px solid #2a2a4a; border-radius: 50px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid #2a2a4a; background: var(--surface); color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .stats { max-width: 1200px; margin: 0 auto 16px; padding: 0 20px; color: var(--muted); font-size: 0.85rem; }
    .grid { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 1px solid #1e1e3a; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(233, 69, 96, 0.2); border-color: var(--accent); }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #111; }
    .card-info { padding: 12px 14px; }
    .card-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { margin-top: 6px; font-size: 0.8rem; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
    .card-badge { display: inline-block; padding: 3px 10px; background: var(--accent2); border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 999; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal.show { display: flex; }
    .modal-content { background: var(--surface); border-radius: var(--radius); max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.6); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; z-index: 10; transition: background 0.2s; }
    .modal-close:hover { background: var(--accent); }
    .modal-img { width: 100%; max-height: 60vh; object-fit: contain; background: #000; border-radius: var(--radius) var(--radius) 0 0; }
    .modal-body { padding: 24px; }
    .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    .modal-meta { display: flex; gap: 12px; margin-bottom: 16px; font-size: 0.85rem; color: var(--muted); }
    .modal-prompt { line-height: 1.6; color: var(--text); background: var(--card); padding: 16px; border-radius: 8px; border-left: 3px solid var(--accent); }
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
  </style>
</head>
<body>
  <header>
    <h1>Nebulalicious's Dream</h1>
    <p>A curated gallery of AI-generated artistry</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="m15 15 5 5"/></svg>
      <input type="text" id="searchInput" placeholder="Search titles or prompts..." />
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="All">All</button>
      <button class="filter-btn" data-filter="Scenery">Scenery</button>
      <button class="filter-btn" data-filter="Pose">Pose</button>
      <button class="filter-btn" data-filter="Composite">Composite</button>
    </div>
  </div>

  <div class="stats" id="stats">Loading...</div>
  <div class="grid" id="gallery"></div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <img id="modalImg" class="modal-img" src="" alt="" />
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta">
          <span id="modalCategory"></span>
          <span id="modalDate"></span>
        </div>
        <p class="modal-prompt" id="modalPrompt"></p>
      </div>
    </div>
  </div>

  <script>
    let allImages = [];
    let filteredImages = [];

    async function loadGallery() {
      try {
        const res = await fetch('data.json');
        allImages = await res.json();
        allImages.sort((a, b) => new Date(b.date) - new Date(a.date));
        filteredImages = allImages;
        renderGallery();
      } catch (err) {
        document.getElementById('gallery').innerHTML = `
          <div class="empty">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
            <p>Failed to load gallery</p>
          </div>
        `;
      }
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      const stats = document.getElementById('stats');
      
      if (filteredImages.length === 0) {
        gallery.innerHTML = `
          <div class="empty">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
            <p>No images match your search</p>
          </div>
        `;
        stats.textContent = 'No results';
        return;
      }

      stats.textContent = `Showing ${filteredImages.length} of ${allImages.length} images`;
      
      gallery.innerHTML = filteredImages.map((img, idx) => {
        const date = new Date(img.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return `
          <div class="card" onclick="openModal(${idx})">
            <img src="${img.image_url}" alt="${img.title}" loading="lazy" />
            <div class="card-info">
              <div class="card-title">${img.title}</div>
              <div class="card-meta">
                <span class="card-badge">${img.category}</span>
                <span>${date}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function openModal(idx) {
      const img = filteredImages[idx];
      document.getElementById('modalImg').src = img.image_url;
      document.getElementById('modalTitle').textContent = img.title;
      document.getElementById('modalCategory').innerHTML = `<span class="card-badge">${img.category}</span>`;
      document.getElementById('modalDate').textContent = new Date(img.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      document.getElementById('modalPrompt').textContent = img.prompt;
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        filteredImages = filter === 'All' ? allImages : allImages.filter(img => img.category === filter);
        applySearch();
      });
    });

    document.getElementById('searchInput').addEventListener('input', applySearch);

    function applySearch() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
      let base = activeFilter === 'All' ? allImages : allImages.filter(img => img.category === activeFilter);
      
      if (query) {
        filteredImages = base.filter(img => 
          img.title.toLowerCase().includes(query) || 
          img.prompt.toLowerCase().includes(query)
        );
      } else {
        filteredImages = base;
      }
      
      renderGallery();
    }

    loadGallery();
  </script>
</body>
</html>
