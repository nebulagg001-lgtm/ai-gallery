<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebulalicious's Dream</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { text-align: center; padding: 48px 20px 24px; background: linear-gradient(180deg, #1a1a2e 0%, transparent 100%); }
    header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; background: linear-gradient(135deg, #e94560, #a855f7, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
    header p { color: var(--muted); margin-top: 8px; font-size: 1rem; }
    .controls { max-width: 1200px; margin: 24px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .search-wrap input { width: 100%; padding: 12px 16px 12px 44px; background: var(--surface); border: 1px solid #2a2a4a; border-radius: 50px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid #2a2a4a; background: var(--surface); color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .stats { max-width: 1200px; margin: 0 auto 16px; padding: 0 20px; color: var(--muted); font-size: 0.85rem; }
    .grid { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 1px solid #1e1e3a; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(233, 69, 96, 0.2); border-color: var(--accent); }
    .card-thumb { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #111; }
    .card-thumb-placeholder { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, #1a1a2e, #0f3460); display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); font-size: 0.85rem; padding: 20px; text-align: center; }
    .card-info { padding: 16px; }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .card-meta { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-meta .time { display: flex; align-items: center; gap: 4px; }
    .card-meta .theme { background: var(--accent2); color: #7dd3fc; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
    .no-results { max-width: 1200px; margin: 80px auto; text-align: center; color: var(--muted); padding: 0 20px; }
    .no-results svg { width: 80px; height: 80px; margin-bottom: 16px; opacity: 0.3; }
    .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: var(--surface); border-radius: var(--radius); max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; border: 1px solid #2a2a4a; }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.5); border: none; color: var(--text); font-size: 24px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .modal-close:hover { background: var(--accent); }
    .modal-image { width: 100%; display: block; border-radius: var(--radius) var(--radius) 0 0; }
    .modal-body { padding: 24px; }
    .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .modal-meta { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; font-size: 0.9rem; color: var(--muted); }
    .modal-meta > div { display: flex; align-items: center; gap: 6px; }
    .modal-description { line-height: 1.6; color: var(--text); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .modal-btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .modal-btn.primary { background: var(--accent); color: #fff; }
    .modal-btn.primary:hover { background: #d63850; }
    .modal-btn.secondary { background: var(--accent2); color: #7dd3fc; }
    .modal-btn.secondary:hover { background: #1e4976; }
    @media (max-width: 640px) {
      header h1 { font-size: 2rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-wrap { min-width: 100%; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
      .modal-content { max-height: 95vh; }
      .modal-body { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Nebulalicious's Dream</h1>
    <p>AI-Generated Gallery | Hourly Automated Creativity</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input type="text" id="search" placeholder="Search prompts, themes, or IDs..." />
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="recent">Recent</button>
      <button class="filter-btn" data-filter="older">Older</button>
    </div>
  </div>

  <div class="stats" id="stats">Loading gallery...</div>
  <div class="grid" id="gallery"></div>
  <div class="no-results" id="no-results" style="display:none;">
    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <p>No images found matching your criteria.</p>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <img class="modal-image" id="modal-image" alt="" />
      <div class="modal-body">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-description" id="modal-description"></div>
        <div class="modal-actions">
          <a class="modal-btn primary" id="modal-view" href="#" target="_blank">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            View Full Size
          </a>
          <button class="modal-btn secondary" id="modal-copy">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copy URL
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allData = [];
    let displayedData = [];
    let currentFilter = 'all';
    let searchQuery = '';

    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        allData = data.sort((a, b) => (b.id || 0) - (a.id || 0));
        applyFilters();
      })
      .catch(() => {
        document.getElementById('stats').textContent = 'Failed to load gallery data.';
      });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        applyFilters();
      });
    });

    document.getElementById('search').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      applyFilters();
    });

    function applyFilters() {
      let filtered = allData;

      if (currentFilter === 'recent') {
        const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
        filtered = filtered.filter(item => new Date(item.timestamp || 0) > sevenDaysAgo);
      } else if (currentFilter === 'older') {
        const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
        filtered = filtered.filter(item => new Date(item.timestamp || 0) <= sevenDaysAgo);
      }

      if (searchQuery) {
        filtered = filtered.filter(item => {
          const searchable = `${item.prompt || ''} ${item.theme || ''} ${item.id || ''} ${item.timestamp || ''}`.toLowerCase();
          return searchable.includes(searchQuery);
        });
      }

      displayedData = filtered;
      renderGallery();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      const stats = document.getElementById('stats');
      const noResults = document.getElementById('no-results');

      if (displayedData.length === 0) {
        gallery.innerHTML = '';
        noResults.style.display = 'block';
        stats.textContent = `No images found (${allData.length} total in gallery)`;
        return;
      }

      noResults.style.display = 'none';
      stats.textContent = `Showing ${displayedData.length} of ${allData.length} images`;

      gallery.innerHTML = displayedData.map(item => {
        const date = item.date || 'Unknown date';

        const imgTag = item.imgbb_url
          ? `<img class="card-thumb" src="${item.imgbb_url}" alt="${item.title || 'AI Art'}" loading="lazy" />`
          : `<div class="card-thumb-placeholder"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><p>Image Unavailable</p></div>`;

        return `
          <div class="card" data-id="${item.id || ''}">
            ${imgTag}
            <div class="card-info">
              <div class="card-title">${truncate(item.title || 'Untitled', 60)}</div>
              <div class="card-meta">
                <span class="time">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                  ${date}
                </span>
                ${item.style ? `<span class="theme">${item.style}</span>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          const item = displayedData.find(d => String(d.id) === id);
          if (item) openModal(item);
        });
      });
    }

    function truncate(str, max) {
      return str.length > max ? str.slice(0, max) + '...' : str;
    }

    function openModal(item) {
      const modal = document.getElementById('modal');
      const image = document.getElementById('modal-image');
      const title = document.getElementById('modal-title');
      const meta = document.getElementById('modal-meta');
      const description = document.getElementById('modal-description');
      const viewBtn = document.getElementById('modal-view');
      const copyBtn = document.getElementById('modal-copy');

      image.src = item.imgbb_url || '';
      title.textContent = item.title || 'Untitled';

      const date = item.date || 'Unknown date';

      meta.innerHTML = `
        <div>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          ${date}
        </div>
        ${item.id ? `<div><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect></svg> ID: ${item.id}</div>` : ''}
        ${item.style ? `<div><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg> ${item.style}</div>` : ''}
      `;

      description.textContent = item.prompt || 'No description available.';

      viewBtn.href = item.imgbb_url || '#';
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(item.imgbb_url || '').then(() => {
          const original = copyBtn.innerHTML;
          copyBtn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
          setTimeout(() => { copyBtn.innerHTML = original; }, 2000);
        });
      };

      modal.classList.add('active');
    }

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('active');
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') {
        document.getElementById('modal').classList.remove('active');
      }
    });
  </script>
</body>
</html>
