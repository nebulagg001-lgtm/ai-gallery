<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebulalicious's Dream</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { text-align: center; padding: 48px 20px 24px; background: linear-gradient(180deg, #1a1a2e 0%, transparent 100%); }
    header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; background: linear-gradient(135deg, #e94560, #a855f7, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
    header p { color: var(--muted); margin-top: 8px; font-size: 1rem; }
    .controls { max-width: 1200px; margin: 24px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .search-wrap input { width: 100%; padding: 12px 16px 12px 44px; background: var(--surface); border: 1px solid #2a2a4a; border-radius: 50px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid #2a2a4a; background: var(--surface); color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .stats { max-width: 1200px; margin: 0 auto 16px; padding: 0 20px; color: var(--muted); font-size: 0.85rem; }
    .grid { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 1px solid #1e1e3a; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(233, 69, 96, 0.2); border-color: var(--accent); }
    .card-thumb { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #111; }
    .card-thumb-placeholder { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, #1a1a2e, #0f3460); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .card-thumb-placeholder span { font-size: 0.8rem; color: var(--muted); text-align: center; padding: 0 12px; }
    .card-thumb-placeholder a { font-size: 0.75rem; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); border-radius: 20px; padding: 4px 12px; }
    .card-thumb-placeholder a:hover { background: var(--accent); color: #fff; }
    .card-info { padding: 12px 14px; }
    .card-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { margin-top: 6px; font-size: 0.8rem; color: var(--muted); }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal.show { display: flex; }
    .modal-content { background: var(--surface); border-radius: var(--radius); max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.5); border: none; color: #fff; cursor: pointer; font-size: 20px; z-index: 10; transition: background 0.2s; }
    .modal-close:hover { background: var(--accent); }
    .modal-img-wrap { width: 100%; max-height: 60vh; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .modal-img { max-width: 100%; max-height: 60vh; object-fit: contain; display: block; }
    .modal-img-fallback { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 40px; min-height: 200px; }
    .modal-img-fallback p { color: var(--muted); font-size: 0.9rem; }
    .modal-img-fallback a { color: var(--accent); text-decoration: none; font-weight: 600; border: 1px solid var(--accent); padding: 10px 24px; border-radius: 50px; transition: all 0.2s; }
    .modal-img-fallback a:hover { background: var(--accent); color: #fff; }
    .modal-body { padding: 24px; }
    .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    .modal-actions { margin-bottom: 16px; }
    .modal-actions a { display: inline-block; color: var(--accent); text-decoration: none; font-size: 0.85rem; border: 1px solid var(--accent); border-radius: 20px; padding: 5px 14px; transition: all 0.2s; }
    .modal-actions a:hover { background: var(--accent); color: #fff; }
    .modal-section { margin-top: 16px; }
    .modal-section h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 6px; }
    .modal-section p { line-height: 1.6; color: var(--text); }
    .modal-section.prompt-section p { font-style: italic; color: #b0b0c0; font-size: 0.9rem; line-height: 1.7; background: rgba(255,255,255,0.04); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 8px 8px 0; }
    @media (max-width: 600px) {
      .controls { flex-direction: column; align-items: stretch; }
      .search-wrap { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Nebulalicious's Dream</h1>
    <p>AI-Generated Fashion in Iconic Landscapes</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search by title, scenery, pose, or outfit..." />
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="composite">Composite</button>
    </div>
  </div>

  <div class="stats" id="stats">Showing 0 images</div>
  <div class="grid" id="gallery"></div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-img-wrap" id="modal-img-wrap">
        <img id="modal-img" class="modal-img" src="" alt="" referrerpolicy="no-referrer" crossorigin="anonymous" />
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-actions">
          <a id="modal-open-link" href="#" target="_blank" rel="noopener">View full image &rarr;</a>
        </div>
        <div class="modal-section">
          <h3>Scenery</h3>
          <p id="modal-scenery"></p>
        </div>
        <div class="modal-section">
          <h3>Pose</h3>
          <p id="modal-pose"></p>
        </div>
        <div class="modal-section">
          <h3>Outfit</h3>
          <p id="modal-outfit"></p>
        </div>
        <div class="modal-section">
          <h3>Hairstyle</h3>
          <p id="modal-hairstyle"></p>
        </div>
        <div class="modal-section">
          <h3>Style</h3>
          <p id="modal-style"></p>
        </div>
        <div class="modal-section prompt-section" id="modal-prompt-section">
          <h3>AI Prompt</h3>
          <p id="modal-prompt"></p>
        </div>
        <div class="modal-section">
          <h3>Date</h3>
          <p id="modal-date"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allImages = [];
    let filteredImages = [];

    async function loadData() {
      try {
        const res = await fetch('data.json?t=' + Date.now());
        allImages = await res.json();
        allImages.reverse();
        filteredImages = allImages;
        renderGallery();
      } catch (err) {
        console.error('Failed to load data:', err);
        document.getElementById('stats').textContent = 'Failed to load images.';
      }
    }

    function makeThumb(img) {
      // Try direct embed first; fallback to placeholder with link if blocked
      const wrap = document.createElement('div');
      if (img.imgbb_url) {
        const el = document.createElement('img');
        el.className = 'card-thumb';
        el.alt = img.title;
        el.loading = 'lazy';
        el.referrerPolicy = 'no-referrer';
        el.crossOrigin = 'anonymous';
        el.src = img.imgbb_url;
        el.onerror = function() {
          // Replace with fallback placeholder + link
          const ph = document.createElement('div');
          ph.className = 'card-thumb-placeholder';
          ph.innerHTML = `<span>${img.title}</span><a href="${img.imgbb_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View Image</a>`;
          el.replaceWith(ph);
        };
        return el;
      } else {
        const ph = document.createElement('div');
        ph.className = 'card-thumb-placeholder';
        ph.innerHTML = `<span>${img.title}</span>`;
        return ph;
      }
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      const stats = document.getElementById('stats');
      gallery.innerHTML = '';
      stats.textContent = `Showing ${filteredImages.length} image${filteredImages.length !== 1 ? 's' : ''}`;

      filteredImages.forEach(img => {
        const card = document.createElement('div');
        card.className = 'card';
        card.appendChild(makeThumb(img));
        const info = document.createElement('div');
        info.className = 'card-info';
        info.innerHTML = `<div class="card-title">${img.title}</div><div class="card-meta">${img.date}</div>`;
        card.appendChild(info);
        card.addEventListener('click', () => openModal(img));
        gallery.appendChild(card);
      });
    }

    function openModal(img) {
      const modalImg = document.getElementById('modal-img');
      const modalWrap = document.getElementById('modal-img-wrap');

      // Reset
      modalWrap.innerHTML = '';

      if (img.imgbb_url) {
        const imgEl = document.createElement('img');
        imgEl.className = 'modal-img';
        imgEl.alt = img.title;
        imgEl.referrerPolicy = 'no-referrer';
        imgEl.crossOrigin = 'anonymous';
        imgEl.src = img.imgbb_url;
        imgEl.onerror = function() {
          modalWrap.innerHTML = `
            <div class="modal-img-fallback">
              <p>Image preview blocked by host — open directly to view.</p>
              <a href="${img.imgbb_url}" target="_blank" rel="noopener">Open Image in New Tab</a>
            </div>`;
        };
        modalWrap.appendChild(imgEl);
      }

      document.getElementById('modal-title').textContent = img.title;
      document.getElementById('modal-open-link').href = img.imgbb_url || '#';
      document.getElementById('modal-scenery').textContent = img.scenery || 'N/A';
      document.getElementById('modal-pose').textContent = img.pose || 'N/A';
      document.getElementById('modal-outfit').textContent = img.outfit || 'N/A';
      document.getElementById('modal-hairstyle').textContent = img.hairstyle || 'N/A';
      document.getElementById('modal-style').textContent = img.style || 'N/A';

      const promptSection = document.getElementById('modal-prompt-section');
      const promptEl = document.getElementById('modal-prompt');
      if (img.prompt) {
        promptEl.textContent = img.prompt;
        promptSection.style.display = '';
      } else {
        promptSection.style.display = 'none';
      }

      document.getElementById('modal-date').textContent = img.date || 'N/A';
      document.getElementById('modal').classList.add('show');
    }

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('show');
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') {
        document.getElementById('modal').classList.remove('show');
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        filteredImages = filter === 'all' ? allImages : allImages.filter(i => i.type === filter);
        renderGallery();
      });
    });

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
      const base = activeFilter === 'all' ? allImages : allImages.filter(i => i.type === activeFilter);
      filteredImages = q
        ? base.filter(i => [i.title, i.scenery, i.pose, i.outfit, i.hairstyle, i.prompt]
            .filter(Boolean).some(v => v.toLowerCase().includes(q)))
        : base;
      renderGallery();
    });

    loadData();
  </script>
</body>
</html>
